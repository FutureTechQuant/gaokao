name: discover

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * 1"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run discover pipeline
        run: python -m crawler.pipeline.discover

      - name: Commit discovered sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/discovered_sources.json docs/latest.json README.md
          git diff --cached --quiet || git commit -m "chore: update discovered sources"
          git push
