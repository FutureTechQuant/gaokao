name: collect

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install requests beautifulsoup4 pyyaml

      - name: Build schools seed
        run: |
          python scripts/build_schools_seed.py

      - name: Generate official source candidates from seed
        run: |
          python scripts/generate_sources_from_seed.py

      - name: Generate source templates
        run: |
          python scripts/generate_source_templates.py

      - name: Run collect pipeline
        run: |
          python -m crawler.pipeline.collect

      - name: Show output tree
        run: |
          echo "=== config ==="
          ls -R config || true
          echo "=== data ==="
          ls -R data || true
          echo "=== docs ==="
          ls -R docs || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: collect-output
          path: |
            config/schools_seed.generated.yaml
            config/sources/generated/
            data/
            docs/
            README.md
          if-no-files-found: warn

      - name: Commit generated files
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== git status before add ==="
          git status --short || true

          echo "=== git remote before ==="
          git remote -v || true

          git remote set-url origin "${REPO_URL}"

          echo "=== git remote after ==="
          git remote -v

          git add config/schools_seed.generated.yaml config/sources/generated/ data/ docs/ README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update collected data"
          git push origin HEAD:${GITHUB_REF_NAME}
