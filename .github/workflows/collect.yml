name: collect

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyyaml

      - name: Generate source templates
        run: |
          python scripts/generate_source_templates.py

      - name: Run collect pipeline
        run: |
          python -m crawler.pipeline.collect

      - name: Show output tree
        run: |
          echo "=== config/sources/generated ==="
          ls -R config/sources/generated || true
          echo "=== data ==="
          ls -R data || true
          echo "=== docs ==="
          ls -R docs || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: collect-output
          path: |
            config/sources/generated/
            data/
            docs/
            README.md
          if-no-files-found: warn

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com]"
          git add config/sources/generated/ data/ docs/ README.md
          git diff --cached --quiet || git commit -m "chore: update collected data"
          git push
